name: digital_binder
description: A Flutter project for storing and organizing photo cards in a binder.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  image_cropper: ^5.0.1 
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_native_splash: ^2.4.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#FFDAF4"
  image: assets/images/splash.png

  android: true
  ios: true

  android_12:
    color: "#FFDAF4"
    image: assets/images/splash.png

  android_gravity: center
  ios_content_mode: center

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/.png"